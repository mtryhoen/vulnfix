name: Security scan & auto-fix

on:
  schedule:
    - cron: '0 3 * * 1'   # weekly Monday 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write          # to push the fix branch
  pull-requests: write     # to open the PR

jobs:
  scan-and-fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ---- 1. Run scanners ----
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'json'
          output: 'trivy-fs.json'
          severity: 'CRITICAL,HIGH,MEDIUM'
          exit-code: '0'    # don't fail the job on findings

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'myorg/myapp:latest'
          format: 'json'
          output: 'trivy-image.json'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

      - name: Install & run Bandit
        run: |
          pip install bandit
          bandit -r . -f json -o bandit.json || true   # exit 1 on findings, ignore

      # ---- 2. Auto-fix ----
      - name: vulnfix
        uses: your-org/vulnfix@v1
        with:
          reports: 'trivy-fs.json trivy-image.json bandit.json'
          min-severity: 'high'
          open-pr: 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
